name: On-Server scRNA Pipeline

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: "Dataset to process"
        required: true
        type: choice
        options:
          - pbmc1k
          - pbmc10k
        default: pbmc1k
      run_qc:
        description: "Run QC analysis (UMAP + violin plots)"
        required: true
        type: choice
        options:
          - "1"
          - "0"
        default: "1"
      write_h5ad:
        description: "Save H5AD file"
        required: true
        type: choice
        options:
          - "0"
          - "1"
        default: "0"
      mode:
        description: "Execution mode"
        required: true
        type: choice
        options:
          - full-run
          - dry-run
        default: full-run

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Run on-server pipeline
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          RUN_QC: ${{ inputs.run_qc }}
          WRITE_H5AD: ${{ inputs.write_h5ad }}
          DOWNLOAD_RESULTS: "1"
        run: |
          if [ "${{ inputs.mode }}" = "dry-run" ]; then
            bash scripts/e2e_onserver_pbmc.sh ${{ inputs.dataset }} --dry-run
          else
            bash scripts/e2e_onserver_pbmc.sh ${{ inputs.dataset }}
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: onserver-${{ inputs.dataset }}-results
          path: onserver_runs/
          if-no-files-found: ignore
          retention-days: 30
